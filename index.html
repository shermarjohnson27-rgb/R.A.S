function CountUp({target,prefix="",suffix="",duration=1200,decimals=0}){
const[val,setVal]=useState(0);const ref=useRef(null);
useEffect(()=>{const num=parseFloat(target);if(isNaN(num)){setVal(target);return}
const st=performance.now();
const step=(now)=>{const p=Math.min((now-st)/duration,1);const e=1-Math.pow(1-p,3);
setVal(decimals>0?(e*num).toFixed(decimals):Math.round(e*num));
if(p<1)ref.current=requestAnimationFrame(step)};
ref.current=requestAnimationFrame(step);return()=>cancelAnimationFrame(ref.current)},[target,duration,decimals]);
return<span>{prefix}{typeof val==='number'?val.toLocaleString():val}{suffix}</span>}

const dailyLoss=Math.round(monthlyRev*parseFloat(gain)*0.07/30);
const lostSoFar=Math.round(dailyLoss/86400*secs);
return<span className="loss-counter">${lostSoFar.toLocaleString()}</span>}

))}</>}

{(ai||typ)&&<><div style={{fontSize:8,color:typ?ac:sb,fontWeight:700,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>{typ?<><span>GENERATING</span><span className="dl"><span>.</span><span>.</span><span>.</span></span></>:"\u2713 READY"}</div>
<textarea value={typ?ai:ed} onChange={e=>setEd(e.target.value)} disabled={typ} className={typ?"tg":""} style={{width:"100%",minHeight:110,background:"#F9F8F6",border:`1px solid ${bd}`,borderRadius:8,padding:10,color:tx,fontSize:11,lineHeight:1.6,fontFamily:F,boxSizing:"border-box",resize:"vertical",transition:"all 0.3s"}}/>

</div>)}</div></>}

<div style={{textAlign:"right"}}><div style={{display:"flex",alignItems:"center",gap:4}}><Stars c={Math.round(c.rating)} s={12}/><span style={{fontSize:16,fontFamily:D,color:i===0?ac:tx}}>{c.rating}</span></div><div style={{fontSize:10,color:parseFloat(c.trend)>0?ac:parseFloat(c.trend)<0?"#B91C1C":sb,fontWeight:600}}>{parseFloat(c.trend)>0?"+":""}{c.trend}</div></div></div>))}
<div className="afu" style={{animationDelay:"800ms",marginTop:14,padding:10,background:"#ECFDF5",borderRadius:8,textAlign:"center",fontSize:11,color:ac,fontWeight:600}}>You\u2019re #1 in your area. R.A.S. is keeping you ahead.</div></div>
</Stagger>}

{[{v:s.req,l:"Requests Sent",c:"#4338CA"},{v:reviews.filter(r=>r.rating>=4).length,l:"Happy Customers",c:ac},{v:s.avg,l:"Current Rating",c:gd,dec:1}].map((x,i)=>(<div key={i} className="chl afu" style={{animationDelay:`${i*100}ms`,background:cd,border:`1px solid ${bd}`,borderRadius:12,padding:16,textAlign:"center"}}><div style={{fontSize:28,fontFamily:D,color:x.c}}><CountUp target={x.v} decimals={x.dec||0}/></div><div style={{fontSize:10,color:sb}}>{x.l}</div></div>))}</div>
{reviews.filter(r=>r.rating>=4&&r.status!=="review_requested").map((r,idx)=>(<div key={r.id} className="ch afu" style={{animationDelay:`${300+idx*70}ms`,display:"flex",alignItems:"center",gap:10,background:cd,border:`1px solid ${bd}`,borderRadius:10,padding:"10px 14px",marginBottom:5}}><PI p={r.plat}/><div style={{flex:1}}><span style={{fontSize:11,fontWeight:600}}>{r.author}</span><Stars c={r.rating} s={10}/><p style={{fontSize:10,color:sb,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:340}}>{r.text}</p></div>
<button onClick={()=>{setR(p=>p.map(x=>x.id===r.id?{...x,status:"review_requested"}:x));flash(`Sent to ${r.author}!`)}} className="ch" style={{background:"#4338CA",border:"none",color:"#fff",padding:"6px 14px",borderRadius:7,fontSize:10,fontWeight:700,fontFamily:F}}>{"\u{1F680}"} Send</button></div>))}</>}

{p.pop&&<div className="asi" style={{animationDelay:"500ms",position:"absolute",top:-11,left:"50%",transform:"translateX(-50%)",background:ac,color:"#fff",fontSize:9,fontWeight:800,padding:"3px 14px",borderRadius:20,letterSpacing:1}}>MOST POPULAR</div>}
<div style={{fontSize:12,fontWeight:700,color:p.pop?ac:sb,marginBottom:4}}>{p.n}</div>
<div style={{display:"flex",alignItems:"baseline",gap:2,marginBottom:2}}><span style={{fontSize:38,fontFamily:D,color:tx,lineHeight:1}}>${p.pr}</span><span style={{fontSize:12,color:sb}}>/mo</span></div>
<div style={{fontSize:10,color:sb,marginBottom:16}}>{p.d}</div>
<button className="ch" style={{width:"100%",padding:"10px",background:p.pop?ac:"#EFECEA",border:p.pop?"none":`1px solid ${bd}`,color:p.pop?"#fff":tx,borderRadius:8,fontSize:12,fontWeight:700,fontFamily:F,marginBottom:14,transition:"all 0.3s"}}>Start Free Trial</button>
<div style={{borderTop:`1px solid ${bd}`,paddingTop:12}}>{p.feat.map((f,j)=><div key={j} className="afu" style={{animationDelay:`${400+pi*100+j*60}ms`,display:"flex",gap:6,alignItems:"flex-start",marginBottom:6}}><span style={{color:ac,fontSize:11,flexShrink:0}}>{"\u2713"}</span><span style={{fontSize:11,color:"#5C5950",lineHeight:1.4}}>{f}</span></div>)}</div>
</div>))}
</div>
<div style={{textAlign:"center",marginTop:24}}>
<div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:10,padding:"10px 20px"}}>
<span style={{fontSize:16}}>{"\u{1F3C6}"}</span>
<span style={{fontSize:12,color:gd,fontWeight:700}}>30-Day Money-Back Guarantee \u2022 Zero Risk</span>
</div>
</div>
</Stagger>}
</div>

{toast&&<div className={toastOut?"tx":"te"} style={{position:"fixed",bottom:24,right:24,background:ac,color:"#fff",padding:"11px 22px",borderRadius:10,fontSize:12,fontWeight:700,boxShadow:"0 6px 20px rgba(26,92,58,0.15)",zIndex:200}}>{"\u2713"} {toast}</div>}
</>);
}
